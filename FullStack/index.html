<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Desafio JS Moderno</title>
   <!--  -->
   <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
   
   <link rel="stylesheet" href="./css/style.css">
   
</head>
<body>
   <div class="container">
      <h2 class="">Desafio Países - FullStack</h2>
      <hr>
      <div class="row country-container">
         <div class="col s6 country-list">
            <h4>Países (<span id="countCountries"></span>)</h4>
            <h5>População total: <span id="totalPopulationList"></span></h5>
            <div id="tabCountries"></div>
         </div>
         <div class="col s6 country-list">
            <h4>Países selecionados (<span id="countFavorites"></span>)</h4>
            <h5>População total: <span id="totalPopulationFavorites"></span></h5>
            <div id="tabFavorites"></div>
         </div>
      </div>
   </div>
   <!-- // -->
   <script src="./js/script.js"></script>
</body>
</html>
